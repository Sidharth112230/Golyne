*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --void:#0a0817;
  --deep:#140d2a;
  --violet:#7c3aed;
  --violet-bright:#9d4edd;
  --cyan:#00d4ff;
  --cyan-bright:#00f5ff;
  --pink:#ff006e;
  --white:#f0f0ff;
  --muted:#b8a9c9;
  --glass:rgba(157,78,221,0.12);
  --glass-border:rgba(0,212,255,0.2);
}
html{scroll-behavior:smooth;}
body{background:var(--void);color:var(--white);font-family:'Space Grotesk',sans-serif;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--void);}
::-webkit-scrollbar-thumb{background:var(--violet);border-radius:2px;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");opacity:.4;pointer-events:none;z-index:0;}

.logo{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,#9d4edd,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:flex;align-items:center;gap:8px;text-decoration:none;}
.nav-links{display:flex;gap:2rem;list-style:none;}
.nav-links a{color:var(--muted);text-decoration:none;font-size:.9rem;font-weight:500;transition:color .2s;}
.nav-links a:hover{color:var(--white);}
.nav-cta{background:linear-gradient(135deg,#9d4edd,#00d4ff);color:#fff;border:none;padding:10px 24px;border-radius:50px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:.9rem;cursor:pointer;transition:opacity .2s,transform .2s;box-shadow:0 0 20px rgba(0,212,255,0.3);}
.nav-cta:hover{opacity:.85;transform:translateY(-1px);}

.orb1{width:500px;height:500px;background:radial-gradient(circle,var(--violet) 0%,transparent 70%);top:-150px;left:-100px;}
.orb2{width:400px;height:400px;background:radial-gradient(circle,var(--cyan) 0%,transparent 70%);bottom:-100px;right:-80px;animation-delay:-3s;}

.back-link:hover{color:var(--cyan-bright);}
.service-badge{display:inline-flex;align-items:center;gap:8px;background:var(--glass);border:1px solid var(--glass-border);border-radius:50px;padding:6px 16px;font-size:.75rem;color:var(--cyan-bright);margin-bottom:1.25rem;backdrop-filter:blur(10px);}
.badge-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan-bright);animation:pulse 2s ease-in-out infinite;}

.hero-title{font-family:'Syne',sans-serif;font-size:clamp(2.4rem,5vw,4rem);font-weight:800;line-height:1.08;letter-spacing:-1.5px;margin-bottom:1.2rem;}
.gradient-text{background:linear-gradient(135deg,#9d4edd 0%,#00d4ff 50%,#ff006e 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hero-desc{color:var(--muted);font-size:1rem;line-height:1.75;margin-bottom:2rem;max-width:480px;}
.hero-actions{display:flex;gap:1rem;flex-wrap:wrap;}
.btn-primary{background:linear-gradient(135deg,#9d4edd,#00d4ff);color:#fff;border:none;padding:14px 32px;border-radius:50px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:.95rem;cursor:pointer;transition:all .3s;box-shadow:0 0 30px rgba(0,212,255,0.3);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 20px 40px rgba(124,58,237,.4);}
.btn-secondary{background:transparent;color:var(--white);border:1px solid var(--glass-border);padding:14px 32px;border-radius:50px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:.95rem;cursor:pointer;transition:all .3s;backdrop-filter:blur(10px);}
.btn-secondary:hover{background:var(--glass);}

/* PRICING CARD */

.price-tag-value{font-family:'Syne',sans-serif;font-size:2.8rem;font-weight:800;background:linear-gradient(135deg,#9d4edd,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;margin-bottom:.3rem;}
.price-tag-note{font-size:.78rem;color:var(--muted);margin-bottom:1.5rem;}
.price-divider{height:1px;background:var(--glass-border);margin-bottom:1.5rem;}
.quick-features{display:flex;flex-direction:column;gap:.7rem;margin-bottom:1.75rem;}
.qf-item{display:flex;align-items:center;gap:.6rem;font-size:.83rem;color:var(--white);}

.included-card:hover{border-color:rgba(0,212,255,0.4);transform:translateY(-4px);box-shadow:0 0 24px rgba(0,212,255,0.15);}
.included-card:hover::after{opacity:1;}
.ic-icon{font-size:1.6rem;margin-bottom:.9rem;}
.ic-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:.45rem;}
.ic-desc{font-size:.82rem;color:var(--muted);line-height:1.65;}

.faq-item{background:var(--glass);border:1px solid var(--glass-border);border-radius:16px;overflow:hidden;}

.faq-chevron{font-size:.8rem;transition:transform .3s;color:var(--cyan-bright);}
.faq-item.open .faq-chevron{transform:rotate(180deg);}
.faq-answer{max-height:0;overflow:hidden;transition:max-height .35s ease,padding .35s ease;padding:0 1.5rem;font-size:.83rem;color:var(--muted);line-height:1.7;}
.faq-item.open .faq-answer{max-height:200px;padding:0 1.5rem 1.25rem;}

.cta-bottom::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(157,78,221,0.2),transparent 70%);}
.cta-inner{position:relative;z-index:1;}
.cta-bottom h2{font-family:'Syne',sans-serif;font-size:clamp(2rem,4vw,3.5rem);font-weight:800;letter-spacing:-1.5px;line-height:1.1;margin-bottom:1.2rem;}
.cta-bottom p{color:var(--muted);font-size:1rem;max-width:460px;margin:0 auto 2.5rem;line-height:1.7;}

/* FOOTER */
footer{padding:40px 5% 28px;border-top:1px solid var(--glass-border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;}
.footer-copy{font-size:.78rem;color:var(--muted);}

/* REVEAL */
.reveal{opacity:0;transform:translateY(28px);transition:all .7s cubic-bezier(.16,1,.3,1);}
.reveal.visible{opacity:1;transform:translateY(0);}

/* NOT FOUND */
.not-found{min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:5%;}
.not-found h1{font-family:'Syne',sans-serif;font-size:3rem;font-weight:800;margin-bottom:1rem;}
.not-found p{color:var(--muted);margin-bottom:2rem;}

@media(max-width:900px){
  .nav-links{display:none;}
  .hero-inner{grid-template-columns:1fr;}
  .pricing-hero-card{margin-top:2rem;}
  .results-strip{margin:60px 5%;}
}
</style>

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function renderService(id) {
  const s = services[id];
  if (!s) return renderNotFound();

  document.title = `Golyne — ${s.badge}`;

  const heroLines = s.title.split('\n');
  const titleHTML = heroLines.map((line, i) =>
    i === 1 ? `<span class="gradient-text">${line}</span>` : line
  ).join('<br/>');

  const includedHTML = s.included.map(item => `
    <div class="included-card">
      <div class="ic-icon">${item.icon}</div>
      <div class="ic-title">${item.title}</div>
      <div class="ic-desc">${item.desc}</div>
    </div>
  `).join('');

  const stepsHTML = s.steps.map(step => `
    <div class="step-item">
      <div class="step-circle">${step.num}</div>
      <div class="step-body">
        <h4>${step.title}</h4>
        <p>${step.desc}</p>
      </div>
    </div>
  `).join('');

  const resultsHTML = s.results.map(r => `
    <div class="result-item">
      <div class="result-num">${r.num}</div>
      <div class="result-label">${r.label}</div>
    </div>
  `).join('');

  const faqsHTML = s.faqs.map((faq, i) => `
    <div class="faq-item" id="faq-${i}">
      <div class="faq-question" onclick="toggleFaq(${i})">
        ${faq.q}
        <span class="faq-chevron">▼</span>
      </div>
      <div class="faq-answer">${faq.a}</div>
    </div>
  `).join('');

  const quickFeatHTML = s.quickFeatures.map(f => `
    <div class="qf-item"><div class="qf-check">✓</div>${f}</div>
  `).join('');

  document.getElementById('pageContent').innerHTML = `
    <section class="service-hero">
      <div class="orb orb1"></div>
      <div class="orb orb2"></div>
      <div class="hero-inner">
        <div>
          <a href="index.html" class="back-link">← Back to Golyne</a>
          <div class="service-badge"><span class="badge-dot"></span>${s.badge}</div>
          <h1 class="hero-title">${titleHTML}</h1>
          <p class="hero-desc">${s.description}</p>
          <div class="hero-actions">
            <button class="btn-primary" onclick="window.location.href='index.html#contact'">Get Free Mockup →</button>
            <button class="btn-secondary" onclick="window.location.href='index.html#contact'">Talk to Us</button>
          </div>
        </div>
        <div class="pricing-hero-card">
          <div class="price-tag-label">Starting From</div>
          <div class="price-tag-value">${s.startingFrom}</div>
          <div class="price-tag-note">${s.priceNote}</div>
          <div class="price-divider"></div>
          <div class="quick-features">${quickFeatHTML}</div>
          <button class="cta-full" onclick="window.location.href='index.html#contact'">Get a Custom Quote →</button>
        </div>
      </div>
    </section>

    <div class="content-wrap">
      <div class="reveal">
        <div class="section-label">What's Included</div>
        <h2 class="section-title">Everything You Get</h2>
      </div>
      <div class="included-grid reveal">${includedHTML}</div>
    </div>

    <div class="results-strip reveal">${resultsHTML}</div>

    <div class="content-wrap">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:start;" class="two-col-wrap reveal">
        <div>
          <div class="section-label">How It Works</div>
          <h2 class="section-title">The Process</h2>
          <div class="steps-list">${stepsHTML}</div>
        </div>
        <div>
          <div class="section-label">Common Questions</div>
          <h2 class="section-title">FAQ</h2>
          <div class="faq-list">${faqsHTML}</div>
        </div>
      </div>
    </div>

    <section class="cta-bottom reveal">
      <div class="cta-inner">
        <div class="section-label" style="justify-content:center;display:flex">Ready to Start?</div>
        <h2>Get Your Free <span class="gradient-text">Mockup Today</span></h2>
        <p>No commitment, no payment. We'll show you exactly what we can do for your business — for free.</p>
        <div class="hero-actions" style="justify-content:center">
          <button class="btn-primary" onclick="window.location.href='index.html#contact'">💬 WhatsApp Us Now →</button>
          <button class="btn-secondary" onclick="window.location.href='index.html#services'">Explore Other Services</button>
        </div>
      </div>
    </section>
  `;

  // Two-col responsive
  const twoCol = document.querySelector('.two-col-wrap');
  if(window.innerWidth < 900 && twoCol) twoCol.style.gridTemplateColumns = '1fr';

  // Reveal observer
  const obs = new IntersectionObserver(e => e.forEach(x => { if(x.isIntersecting) x.target.classList.add('visible'); }), { threshold: .1 });
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
}

function renderNotFound() {
  document.getElementById('pageContent').innerHTML = `
    <div class="not-found">
      <h1>Service Not Found</h1>
      <p>The service you're looking for doesn't exist. Browse all our services below.</p>
      <button class="btn-primary" onclick="window.location.href='index.html#services'">View All Services →</button>
    </div>
  `;
}

function toggleFaq(i) {
  const item = document.getElementById(`faq-${i}`);
  item.classList.toggle('open');
}

const id = getParam('service');
renderService(id);

window.addEventListener('scroll',()=>{
  document.querySelector('nav').style.background = window.scrollY > 50 ? 'rgba(4,4,15,0.96)' : 'rgba(4,4,15,0.7)';
});

window.addEventListener('resize', () => {
  const twoCol = document.querySelector('.two-col-wrap');
  if(twoCol) twoCol.style.gridTemplateColumns = window.innerWidth < 900 ? '1fr' : '1fr 1fr';
});
</script>
